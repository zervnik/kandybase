<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message sent - Kandybase</title>
  <meta name="description" content="Thank you for contacting Kandybase." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <style>
    :root {
      --bg: #020204;
      --panel: rgba(255,255,255,0.07);
      --line: rgba(255,255,255,0.14);
      --text: #f8f5ff;
      --muted: #b8b0c4;
      --cyan: #65d2ff;
      --violet: #8e6cff;
      --pink: #ef4dde;
      --max: 760px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 28% 20%, rgba(101,210,255,.22), transparent 28%),
        radial-gradient(circle at 72% 25%, rgba(239,77,222,.18), transparent 28%),
        linear-gradient(135deg, #050508 0%, #13091e 58%, #07080c 100%);
      padding: 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: .2;
    }

    main {
      width: min(var(--max), 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow: 0 30px 90px rgba(0,0,0,.42);
      padding: clamp(28px, 6vw, 56px);
      text-align: center;
    }

    img {
      width: 86px;
      height: auto;
      display: block;
      margin: 0 auto 22px;
      filter: drop-shadow(0 0 22px rgba(101,210,255,.36));
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 72px);
      line-height: .95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 18px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 30px;
      padding: 12px 18px;
      border-radius: 999px;
      color: #070711;
      background: linear-gradient(135deg, var(--cyan), var(--violet) 50%, var(--pink));
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 18px 42px rgba(101,210,255,.22);
    }
  </style>
</head>
<body>
  <main>
    <img src="kandybase-candy.png" alt="Kandybase candy logo" />
    <h1>Message sent.</h1>
    <p>Thanks for reaching out to Kandybase. Your message has been received and we will get back to you soon.</p>
    <a href="/">Back to Kandybase</a>
  </main>
</body>
</html>
